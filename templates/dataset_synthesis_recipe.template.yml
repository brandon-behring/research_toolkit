# Recipe template for /dataset-synthesize
#
# Purpose: declarative recipe driving prompt-cached synthetic dataset
# generation via Anthropic Claude. One recipe → one synthesis run →
# JSONL output + manifest. Multiple templates per recipe; each template
# generates target_count samples with cached system + few_shot.
#
# Maintainer: /dataset-synthesize skill (scripts/dataset_synthesize.py
# implements; .claude/skills/dataset-synthesize.md documents).
#
# Validator: validate_recipe() in scripts/dataset_synthesize.py. Run
# `--validate-only` flag before incurring API spend.
#
# Required fields per top-level: model, templates (non-empty list).
# Required fields per template: id, system, user_prompt, target_count.
# Optional per template: few_shot, metadata.
# Optional top-level: defaults (temperature, max_tokens, batch_size).
#
# Closes: brandon-behring/research_toolkit#1.

# Anthropic model identifier. Must be a key in PRICING_PER_MTOK.
# Recommended: claude-sonnet-4-7 for cost/quality balance.
model: claude-sonnet-4-7

# Optional defaults applied to every template (override per-template
# by adding the same fields inside the template entry).
defaults:
  temperature: 0.9
  max_tokens: 800
  batch_size: 1

# At least one template required. Each template generates target_count
# samples; the system prompt + few_shot are cached (Anthropic prompt
# caching) so subsequent calls within the same template hit the cache.
# Anthropic's cache key is content-addressed (computed from system +
# few_shot content automatically); consumers do not pass a cache key.
templates:
  - id: example-template            # unique within recipe
    system: |
      You are a domain expert assistant. Generate realistic samples
      matching the pattern below. Output ONLY the sample content — no
      preamble, no commentary.

      Pattern: [describe the pattern this template generates]
      Constraints: [length, style, format rules]
      Avoid: [what NOT to produce]
    few_shot:
      - role: user
        content: |
          Generate one sample following the pattern.
      - role: assistant
        content: |
          [Example output 1]
      - role: user
        content: |
          Generate another sample.
      - role: assistant
        content: |
          [Example output 2 — show diversity within the pattern]
    user_prompt: |
      Generate one sample. Do not repeat any prior example verbatim.
    target_count: 100
    metadata:
      # Free-form metadata carried into each output row's 'metadata' field.
      # Useful for downstream filtering / stratified evaluation.
      domain: example
      style: declarative

# Optional second template (delete if single-template):
#  - id: another-template
#    system: |
#      [different system prompt — Anthropic caches per content hash]
#    user_prompt: |
#      Generate one sample.
#    target_count: 50
