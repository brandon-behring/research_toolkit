# Bibliography ledger template
# Maintained by /research-gather. Validated by validators/bib_ledger.py.
#
# Required fields per entry:
#   bibkey         (str, required, unique) — convention: {firstauthor}{year}{slug}
#   primary_url    (str, required, valid http(s) URL)
#                   When the URL is on arxiv.org, must be the canonical
#                   `arxiv.org/abs/<id>` form. /pdf/ URLs are rejected.
#   title          (str, required, non-empty) — verbatim from primary source
#   status         (str, enum) — unverified | verified | mismatched
#                   `verified` requires WebFetch confirmation of title +
#                   first-author + year against the primary URL. Default
#                   to `unverified`; promote only with evidence.
#   claim_family   (str, required, must appear in research_plan.md taxonomy)
#
# Optional fields (v1.1 schema extension — eliminates downstream guessing):
#   authors        (str, optional) — first-author display string used by
#                   /dossier-build and /agent-index, e.g., "Hu et al. (2021)"
#                   or "Brier (1950)". Populating this here means downstream
#                   stages render rather than guess.
#   venue          (str, optional) — "ICLR 2022", "NeurIPS 2024 Spotlight",
#                   "arXiv preprint", etc. Same rationale as `authors`.
#   code_url       (str, optional, valid URL when present) — canonical code URL.
#                   Omit the field entirely when no canonical repo exists; do
#                   NOT guess `<author>/<paper-slug>` patterns. Reproduced 2x
#                   across PEFT/calibration dogfood: ~3% of guessed GitHub URLs hit
#                   hard 404s.
#   aliases        (list[str], optional) — alternative names/acronyms for this
#                   entity. Propagated to the entity record in claim_graph by
#                   scripts/build_claim_graph.py. Example: ["ASB", "Agent Sec
#                   Bench"]. Omit when no widely-used alternative name exists.
#   published_online (str, optional, ISO YYYY-MM-DD) — the date the content first
#                   appeared online (arXiv v1 submission / Crossref issued / page
#                   publish date). Lets staleness be judged against content age,
#                   not just cache age. Display-only; omit when unknown.

schema_version: 2
topic: example_topic
generated_at: <YYYY-MM-DD>
current_as_of: <YYYY-MM-DD>
freshness_policy: strict_live

entries:
- bibkey: example2024fooexample
  primary_url: https://arxiv.org/abs/2401.12345
  title: 'Example Paper Title: A Short Subtitle'
  status: unverified
  claim_family: example_family
  retrieved_at: <YYYY-MM-DD>
  verified_at:
  verification_method: webfetch
  verified_fields:
  - primary_url
  freshness_tier: active
  stale_after_days: 90
  evidence_ids:
  - ev_example_0001
  cache_ids:
  - cache_example_0001
- bibkey: another2025bar
  primary_url: https://arxiv.org/abs/2503.67890
  title: 'Another Example: Different Domain'
  status: verified
  claim_family: example_family
  # Optional fields — populate for entries you have verified, omit otherwise:
  authors: Smith et al. (2025)
  venue: NeurIPS 2025
  code_url: https://github.com/example-org/another-bar
  published_online: 2025-03-15  # ISO YYYY-MM-DD; date the content first appeared
                                # online (arXiv v1 / Crossref issued / page publish
                                # date); omit when unknown
  retrieved_at: <YYYY-MM-DD>
  verified_at: <YYYY-MM-DD>
  verification_method: webfetch
  verified_fields:
  - title
  - authors
  - year
  - primary_url
  freshness_tier: active
  stale_after_days: 90
  evidence_ids:
  - ev_example_0002
  cache_ids:
  - cache_example_0002
