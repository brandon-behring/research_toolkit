  notes: 'Promoted v2_2 backlog Item 2. corroboration_count added to claim records when >= 2 (additive, omits at 0/1 for byte-stability). Dashboard Claim Health lists top-corroborated atoms with synthesis_entry link when ref present.'

- id: v23-phase2-C2
