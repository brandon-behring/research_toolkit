# Structured BURN_IN log — companion to BURN_IN_NOTES.md prose.
#
# This is the queryable index. BURN_IN_NOTES.md remains the authoritative
# narrative; this file makes it grep-able and dashboard-able. New entries
# get added here (and in BURN_IN_NOTES.md) when dogfood runs surface
# friction.
#
# Schema per entry:
#   id               (str, unique) — stable identifier; convention: <phase><stage>-<n>
#                                    (e.g., "5b-3.1" = Phase 5b, Stage 3, item 1)
#   phase            (str) — phase 3.5 / 5a / 5b / 5c / cross-cutting
#   stage            (str) — research-plan / research-gather / dossier-build /
#                            agent-index / dossier-audit / url-freshness-check /
#                            multi-stage / N/A
#   finding          (str, one-liner) — what was observed
#   severity         (str, enum) — high / medium / low
#                                  high = data-loss / silent-fail risk
#                                  medium = workflow friction
#                                  low = polish / cosmetic
#   status           (str, enum) — surfaced / applied / deferred / wontfix
#                                  surfaced = observed, not acted on
#                                  applied = fix shipped (must have fix_version)
#                                  deferred = ack'd, in backlog
#                                  wontfix = out of v1.x scope
#   fix_version      (str, optional) — version that addressed this; required when status=applied
#   fix_commit       (str, optional) — commit hash; required when status=applied
#   target_fix_version (str, optional) — planned release for an in-flight item not
#                                        yet applied. A high-severity item passes the
#                                        release gate if status=applied OR it carries
#                                        a target_fix_version (multi-phase milestones
#                                        file high items up front, resolve phase-by-phase).
#   notes            (str, optional) — additional context
#
# Query helper: scripts/burn_in_query.py for filtering by status / severity / phase.
#
# Generated 2026-05-07; backfilled from BURN_IN_NOTES.md narrative entries.

entries:

