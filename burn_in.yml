- id: cc-skills-paths-hides-pipeline
  phase: cross-cutting
  stage: multi-stage
  finding: '7 pipeline skills (research-gather/agent-index/citation-audit/freshness-audit/research-kb-export/dossier-audit/url-freshness-check) carried a paths: frontmatter glob, so they auto-loaded only when a matching file was in context — read as "not loaded / broken" from any other cwd and a restart there never surfaced them'
  severity: high
  status: applied
  fix_version: unreleased
  notes: 'Ships on branch feat/19-topic-discovery. paths is a supported Claude Code field but scopes auto-load to matching files; explicit /slash invocation always works. Removed the paths: line from all 7 files (now load unconditionally, matching dataset-*/research-plan/dossier-build); verified all 7 appeared in the live skill list mid-session with no restart. Added a "Footgun — omit on pipeline skills" caution to docs/conventions/skill-spec.md § paths. Symlink layout was never the problem.'

# ---------------------------------------------------------------------------
# Context-assembly pilot + post-pilot review (2026-05-26)
# ---------------------------------------------------------------------------

- id: ctxasm-1
  phase: context-assembly-pilot
  stage: multi-stage
  finding: 'Cross-source dedup must key on primary_url, not bibkey — two parallel gather agents gave the same Anthropic post two bibkeys (rajasekaran2025effectivecontext vs anthropic2025context); only a primary_url merge caught it'
  severity: high
  status: applied
  fix_version: unreleased
  notes: '_merge_tracks.py dedups bib by primary_url, unions evidence_ids/cache_ids into the canonical entry, builds a bibkey alias map, and remaps assigned_bibkey in gather_trace. Generalizes one scope up to cross-PROJECT KG-compose (dedup bib+cache by primary_url+sha256 across projects) — see ctxasm-6. Decision D2.'

- id: ctxasm-2
  phase: context-assembly-pilot
  stage: research-gather
  finding: 'Slate/JS-rendered blogs (Manus) fragment prose across <span> nodes, so cached text has no sentence-length contiguous span — only sub-sentence verbatim anchors verify'
  severity: medium
  status: applied
  fix_version: v2.6.0
  notes: 'Documented in references/citation_rules.md § "JS-rendered / fragmented sources" as a known render class (v2.6 refs hygiene): reuse the gather-time anchor (the span actually found in the cached render) at agent-index time rather than re-selecting a longer quote that will not substring-match; escalate_to_manual if even a short span will not match.'

- id: ctxasm-3
  phase: context-assembly-pilot
  stage: research-gather
  finding: 'cache_source.py is content-addressed: the same URL via urllib vs Playwright yields different cache_id (different render) — both anchors stay valid; not a bug'
  severity: low
  status: applied
  fix_version: v2.6.0
  notes: 'Documented in references/url_check_protocol.md § "The cache is content-addressed" (v2.6 refs hygiene): two cache entries sharing a source_url may be a urllib + a Playwright capture (distinguished by fetch_method); not a dedup target, and an anchor verifies only against its own render.'

- id: ctxasm-4
  phase: context-assembly-pilot
  stage: agent-index
  finding: 'agent-index SKILL literal "verification_method: cross_reference" predates schema v3; a cross-cutting synthesis claim has no single verbatim anchor and fails citation-audit if forced into the evidence ledger'
  severity: medium
  status: surfaced
  notes: 'Resolution (Decision D4): keep the audited atom layer pure; bind relationship/convergence claims as extra supports[] in contributing primaries (reuse verified anchors); put interpretive synthesis in a typed `synthesis` class (cites atom IDs, grounded-not-substring-audited) in synthesis.md + 00_overview. Skill prompt still needs the cross_reference line updated.'

- id: ctxasm-5
  phase: context-assembly-pilot
  stage: agent-index
  finding: 'Living program revises/merges atoms over time; without an ID discipline, future book citations to atoms would dangle on re-cluster'
  severity: medium
  status: surfaced
  notes: 'Discipline adopted (Decision D5): atom IDs permanent + never-reused from creation; a revision creates a NEW atom and tombstones the old via existing superseded_by/supersedes — never mutate-in-place. Pilot IDs are already structured/deterministic (claim_ctxasm_b1_a1_kvcache_metric), so the discipline is ~free. Forwarding/validation tooling deferred to the first book citation.'

- id: ctxasm-6
  phase: post-pilot-review
  stage: multi-stage
  finding: 'Scaling to many topics needs a cross-PROJECT merge (one source cited by N topics → one KG entity), which the within-project track merge does not cover'
  severity: medium
  status: deferred
  notes: 'Decision D2: generalize _merge_tracks.py into a cross-project KG-compose step (dedup bib+cache by primary_url+sha256 across project exports; union claim-graphs; remap aliases), mirroring rl_and_control/scripts/build_graph_export.py. Build/finalize at first use in Wave 1 (context-rot shares Liu/Chroma with the pilot — the real test). Deferred until then per the cheap-discipline-now / machinery-on-a-trigger meta-pattern.'

